<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HEXATOMBE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* ===================================== */
/* RESET */
/* ===================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Rajdhani', sans-serif;
    background:#050505;
    overflow:hidden;
    height:100vh;
    color:white;
}

/* ===================================== */
/* FUNDO */
/* ===================================== */

.background{
    position:fixed;
    inset:0;
    overflow:hidden;

    background:
    radial-gradient(
        circle at top,
        rgba(120,0,0,0.35),
        #050505 40%
    );
}

.fog{
    position:absolute;

    width:200%;
    height:200%;

    background:
    radial-gradient(
        circle,
        rgba(255,0,0,0.07),
        transparent 60%
    );

    mix-blend-mode:screen;

    animation:fogMove 18s linear infinite;
}

.fog2{
    animation-direction:reverse;
    animation-duration:25s;
    opacity:0.5;
}

@keyframes fogMove{

    from{
        transform:
        translate(-10%, -10%)
        rotate(0deg);
    }

    to{
        transform:
        translate(-20%, -15%)
        rotate(360deg);
    }

}

.red-glow{
    position:absolute;

    width:500px;
    height:500px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(255,0,0,0.18),
        transparent 70%
    );

    filter:blur(40px);
}

.glow1{
    top:-100px;
    left:-100px;
}

.glow2{
    bottom:-150px;
    right:-100px;
}

.grid{
    position:absolute;
    inset:0;

    background-image:
    linear-gradient(
        rgba(255,0,0,0.03) 1px,
        transparent 1px
    ),

    linear-gradient(
        90deg,
        rgba(255,0,0,0.03) 1px,
        transparent 1px
    );

    background-size:40px 40px;
}

.particles{
    position:absolute;
    inset:0;
}

.particles span{
    position:absolute;

    width:2px;
    height:2px;

    border-radius:50%;

    background:#ff2b2b;

    box-shadow:0 0 10px #ff0000;

    animation:particleAnim linear infinite;
}

@keyframes particleAnim{

    from{
        transform:translateY(100vh);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }

}

.vignette{
    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle,
        transparent 40%,
        rgba(0,0,0,0.9) 100%
    );
}

/* ===================================== */
/* MAIN */
/* ===================================== */

.main{
    position:relative;
    z-index:10;

    width:100%;
    height:100vh;

    overflow:hidden;
}

/* ===================================== */
/* TELA INICIAL */
/* ===================================== */

.homeScreen{

    position:absolute;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-direction:column;

    transition:1s cubic-bezier(.77,0,.18,1);
}

.homeScreen.hidden{
    transform:translateY(-100%);
    opacity:0;
}

.logo{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;

    animation:fadeIn 2s ease;
}

.logo h1{

    font-size:58px;

    font-weight:700;

    letter-spacing:8px;

    color:#ff3d3d;

    text-shadow:
    0 0 10px rgba(255,0,0,0.5),
    0 0 25px rgba(255,0,0,0.25),
    0 0 45px rgba(255,0,0,0.15);

}

.logo p{

    margin-top:10px;

    font-size:14px;

    letter-spacing:4px;

    opacity:0.65;

}

.line{
    width:180px;
    height:1px;

    margin:22px 0;

    background:
    linear-gradient(
        to right,
        transparent,
        rgba(255,0,0,0.8),
        transparent
    );

    box-shadow:0 0 10px rgba(255,0,0,0.4);
}

/* ===================================== */
/* TEXTO DESLIZAR */
/* ===================================== */

.swipeText{

    position:absolute;
    bottom:40px;

    display:flex;
    flex-direction:column;
    align-items:center;

    opacity:0.7;

    animation:swipeAnim 2s infinite;
}

.swipeText span{
    font-size:13px;
    letter-spacing:3px;
}

.arrow{
    margin-top:10px;
    font-size:24px;
    color:#ff3d3d;
}

@keyframes swipeAnim{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* ===================================== */
/* MENU PERSONAGENS */
/* ===================================== */

.characterMenu{

    position:absolute;
    inset:0;

    padding:25px;

    transform:translateY(100%);

    transition:1s cubic-bezier(.77,0,.18,1);

    overflow-y:auto;
}

.characterMenu.active{
    transform:translateY(0%);
}

.menuTitle{

    margin-top:50px;
    margin-bottom:25px;
}

.menuTitle h2{
    font-size:36px;
    color:#ff3d3d;
    letter-spacing:3px;
}

.menuTitle p{
    opacity:0.6;
}

/* ===================================== */
/* PERSONAGENS */
/* ===================================== */

.characterList{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.characterCard{

    width:100%;

    min-height:100px;

    border-radius:20px;

    border:1px solid rgba(255,0,0,0.15);

    background:
    linear-gradient(
        to right,
        rgba(255,0,0,0.12),
        rgba(255,255,255,0.02)
    );

    backdrop-filter:blur(5px);

    padding:18px;

    display:flex;
    align-items:center;
    gap:15px;

    position:relative;

    overflow:hidden;

    transition:0.3s;
}

.characterCard:active{
    transform:scale(0.97);
}

.characterCard::before{

    content:"";

    position:absolute;

    left:0;
    top:0;

    width:4px;
    height:100%;

    background:#ff2b2b;

    box-shadow:0 0 10px red;
}

.avatar{

    width:65px;
    height:65px;

    border-radius:14px;

    background:
    linear-gradient(
        135deg,
        #500,
        #111
    );

    border:1px solid rgba(255,0,0,0.25);
}

.characterInfo h3{

    font-size:22px;
    color:white;
}

.characterInfo p{

    font-size:14px;

    opacity:0.6;
}

.nex{

    margin-top:4px;

    color:#ff3d3d;

    font-weight:bold;
}

/* ===================================== */
/* ANIMAÇÕES */
/* ===================================== */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }

}

/* ===================================== */
/* MOBILE */
/* ===================================== */

@media(max-width:500px){

    .logo h1{
        font-size:42px;
        letter-spacing:5px;
    }

    .logo p{
        font-size:11px;
        letter-spacing:3px;
    }

    .line{
        width:140px;
    }

}

</style>
</head>

<body>

<!-- ===================================== -->
<!-- FUNDO -->
<!-- ===================================== -->

<div class="background">

    <div class="fog"></div>
    <div class="fog fog2"></div>

    <div class="red-glow glow1"></div>
    <div class="red-glow glow2"></div>

    <div class="grid"></div>

    <div class="particles">

        <span style="left:10%; animation-duration:8s;"></span>
        <span style="left:20%; animation-duration:12s;"></span>
        <span style="left:35%; animation-duration:9s;"></span>
        <span style="left:50%; animation-duration:15s;"></span>
        <span style="left:65%; animation-duration:7s;"></span>
        <span style="left:75%; animation-duration:13s;"></span>
        <span style="left:85%; animation-duration:11s;"></span>

    </div>

    <div class="vignette"></div>

</div>

<!-- ===================================== -->
<!-- MAIN -->
<!-- ===================================== -->

<div class="main">

    <!-- ================================= -->
    <!-- TELA INICIAL -->
    <!-- ================================= -->

    <div class="homeScreen" id="homeScreen">

        <div class="logo">

            <h1>HEXATOMBE</h1>

            <div class="line"></div>

            <p>ORDEM PARANORMAL RPG</p>

        </div>

        <div class="swipeText">

            <span>DESLIZE PARA CIMA</span>

            <div class="arrow">
                ↑
            </div>

        </div>

    </div>

    <!-- ================================= -->
    <!-- MENU -->
    <!-- ================================= -->

    <div class="characterMenu" id="characterMenu">

        <div class="menuTitle">

            <h2>PERSONAGENS</h2>

            <p>Selecione uma ficha</p>

        </div>

        <div class="characterList">

            <div class="characterCard">

                <div class="avatar"></div>

                <div class="characterInfo">

                    <h3>JAE-YOON</h3>

                    <p>Especialista</p>

                    <div class="nex">
                        NEX 35%
                    </div>

                </div>

            </div>

            <div class="characterCard">

                <div class="avatar"></div>

                <div class="characterInfo">

                    <h3>ARTHUR</h3>

                    <p>Combatente</p>

                    <div class="nex">
                        NEX 50%
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

/* ===================================== */
/* ABRIR MENU */
/* ===================================== */

const homeScreen =
document.getElementById("homeScreen");

const characterMenu =
document.getElementById("characterMenu");

function abrirMenu(){

    homeScreen.classList.add("hidden");

    characterMenu.classList.add("active");
}

/* ===================================== */
/* CLIQUE */
/* ===================================== */

document.addEventListener("click", abrirMenu, {
    once:true
});

/* ===================================== */
/* ARRASTAR */
/* ===================================== */

let startY = 0;

document.addEventListener("touchstart", e => {

    startY = e.touches[0].clientY;

});

document.addEventListener("touchmove", e => {

    let currentY =
    e.touches[0].clientY;

    let diff =
    startY - currentY;

    if(diff > 70){

        abrirMenu();
    }

});

</script>

</body>
</html>
