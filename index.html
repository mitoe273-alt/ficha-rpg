<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>HEXATOMBE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color: transparent;
}

body{
background:#000;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
height:100vh;
color:white;
}

/* FUNDO */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#3a0000 0%,#120000 35%,#000 80%);
overflow:hidden;
}

/* névoa */

.bg::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,rgba(255,0,0,0.08) 0%,transparent 60%);
animation:fog 14s linear infinite;
mix-blend-mode:screen;
}

@keyframes fog{
0%{
transform:translate(-10%,-10%) rotate(0deg);
}
100%{
transform:translate(-20%,-15%) rotate(360deg);
}
}

/* partículas */

.particles{
position:absolute;
inset:0;
overflow:hidden;
}

.particles span{
position:absolute;
display:block;
width:2px;
height:2px;
background:red;
border-radius:50%;
opacity:.5;
animation:particle linear infinite;
}

@keyframes particle{
from{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:.7;
}
to{
transform:translateY(-20vh);
opacity:0;
}
}

/* CONTEÚDO */

.main{
position:relative;
z-index:5;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
}

/* LOGO */

.logo{
font-size:16vw;
font-weight:900;
letter-spacing:4px;
color:#ff1a1a;
text-shadow:
0 0 10px red,
0 0 30px rgba(255,0,0,.7);
line-height:.9;
}

.sub{
margin-top:10px;
font-size:4vw;
letter-spacing:3px;
color:#cfcfcf;
opacity:.8;
}

/* indicador */

.swipeText{
position:absolute;
bottom:35px;
left:50%;
transform:translateX(-50%);
font-size:3.5vw;
opacity:.6;
animation:updown 2s infinite;
letter-spacing:2px;
}

@keyframes updown{
0%,100%{
transform:translateX(-50%) translateY(0);
}
50%{
transform:translateX(-50%) translateY(-10px);
}
}

/* MENU PERSONAGENS */

.characters{
position:fixed;
left:0;
bottom:-100%;
width:100%;
height:78vh;

background:
linear-gradient(to top,
rgba(0,0,0,0.98),
rgba(20,0,0,0.96));

border-top:
2px solid rgba(255,0,0,.4);

backdrop-filter:blur(15px);

z-index:20;

transition:.5s cubic-bezier(.22,.9,.32,1);

padding:22px;

overflow-y:auto;
}

.characters.active{
bottom:0;
}

/* barra */

.dragBar{
width:70px;
height:5px;
border-radius:20px;
background:#777;
margin:0 auto 25px auto;
}

/* titulo */

.charTitle{
text-align:center;
font-size:7vw;
font-weight:900;
letter-spacing:3px;
color:#ff2a2a;
margin-bottom:25px;
text-shadow:0 0 10px red;
}

/* lista */

.charList{
display:flex;
flex-direction:column;
gap:18px;
}

/* card */

.charCard{
display:flex;
align-items:center;
gap:15px;

padding:14px;

background:
linear-gradient(145deg,
rgba(45,0,0,.9),
rgba(10,0,0,.95));

border:
1px solid rgba(255,0,0,.2);

border-radius:18px;

box-shadow:
0 0 20px rgba(255,0,0,.08);

transition:.25s;
}

.charCard:active{
transform:scale(.97);
border-color:red;
}

/* FOTO */

.charImg{
width:72px;
height:72px;
border-radius:14px;
object-fit:cover;

border:2px solid rgba(255,0,0,.5);

box-shadow:
0 0 15px rgba(255,0,0,.25);
}

/* info */

.charInfo{
flex:1;
text-align:left;
}

.charName{
font-size:6vw;
font-weight:800;
color:#fff;
letter-spacing:1px;
}

.charClass{
font-size:3.3vw;
margin-top:3px;
color:#ff4a4a;
}

.charNex{
font-size:3vw;
margin-top:6px;
color:#aaa;
}

/* botão */

.enterBtn{
padding:10px 14px;

border:none;
border-radius:12px;

background:
linear-gradient(to bottom,#ff1a1a,#7a0000);

color:white;
font-weight:800;

font-size:3.4vw;

box-shadow:
0 0 15px rgba(255,0,0,.35);
}

</style>
</head>
<body>

<div class="bg">

<div class="particles" id="particles"></div>

</div>

<div class="main">

<div class="logo">
HEXATOMBE
</div>

<div class="sub">
ORDEM PARANORMAL RPG
</div>

<div class="swipeText">
ARRASTE PARA CIMA
</div>

</div>

<!-- MENU PERSONAGENS -->

<div class="characters" id="characters">

<div class="dragBar"></div>

<div class="charTitle">
PERSONAGENS
</div>

<div class="charList">

<!-- JAE -->

<div class="charCard">

<!-- COLOQUE SUA IMAGEM AQUI -->
<img
src="jae.png"
class="charImg"
>

<div class="charInfo">

<div class="charName">
JAE-YOON
</div>

<div class="charClass">
ESPECIALISTA
</div>

<div class="charNex">
Dificuldade: Médio
</div>

</div>

<button class="enterBtn">
ENTRAR
</button>

</div>

</div>

</div>

<script>

/* partículas */

const particles =
document.getElementById("particles");

for(let i=0;i<45;i++){

const p =
document.createElement("span");

p.style.left =
Math.random()*100 + "%";

p.style.animationDuration =
(5 + Math.random()*10) + "s";

p.style.animationDelay =
Math.random()*5 + "s";

p.style.opacity =
Math.random();

particles.appendChild(p);

}

/* MENU */

const menu =
document.getElementById("characters");

function openMenu(){
menu.classList.add("active");
}

function closeMenu(){
menu.classList.remove("active");
}

/* clique */

document.addEventListener("click", e=>{

if(
e.target.closest(".charCard")
) return;

openMenu();

});

/* swipe */

let startY = 0;
let endY = 0;

document.addEventListener(
"touchstart",
e=>{
startY =
e.touches[0].clientY;
}
);

document.addEventListener(
"touchmove",
e=>{
endY =
e.touches[0].clientY;
}
);

document.addEventListener(
"touchend",
()=>{

if(startY - endY > 80){
openMenu();
}

if(endY - startY > 80){
closeMenu();
}

}
);

</script>

</body>
</html>
