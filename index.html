<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HEXATOMBE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* ===================================== */
/* RESET */
/* ===================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Rajdhani', sans-serif;
    background:#050505;
    overflow:hidden;
    height:100vh;
    color:white;
}

/* ===================================== */
/* FUNDO */
/* ===================================== */

.background{
    position:fixed;
    inset:0;
    overflow:hidden;

    background:
    radial-gradient(
        circle at top,
        rgba(120,0,0,0.35),
        #050505 40%
    );
}

/* ===================================== */
/* NÉVOA */
/* ===================================== */

.fog{
    position:absolute;

    width:200%;
    height:200%;

    background:
    radial-gradient(
        circle,
        rgba(255,0,0,0.07),
        transparent 60%
    );

    mix-blend-mode:screen;

    animation:fogMove 18s linear infinite;
}

.fog2{
    animation-direction:reverse;
    animation-duration:25s;
    opacity:0.5;
}

@keyframes fogMove{

    from{
        transform:
        translate(-10%, -10%)
        rotate(0deg);
    }

    to{
        transform:
        translate(-20%, -15%)
        rotate(360deg);
    }

}

/* ===================================== */
/* GLOW */
/* ===================================== */

.red-glow{
    position:absolute;

    width:500px;
    height:500px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(255,0,0,0.18),
        transparent 70%
    );

    filter:blur(40px);
}

.glow1{
    top:-100px;
    left:-100px;
}

.glow2{
    bottom:-150px;
    right:-100px;
}

/* ===================================== */
/* GRID */
/* ===================================== */

.grid{
    position:absolute;
    inset:0;

    background-image:
    linear-gradient(
        rgba(255,0,0,0.03) 1px,
        transparent 1px
    ),

    linear-gradient(
        90deg,
        rgba(255,0,0,0.03) 1px,
        transparent 1px
    );

    background-size:40px 40px;
}

/* ===================================== */
/* PARTÍCULAS */
/* ===================================== */

.particles{
    position:absolute;
    inset:0;
}

.particles span{
    position:absolute;

    width:2px;
    height:2px;

    border-radius:50%;

    background:#ff2b2b;

    box-shadow:0 0 10px #ff0000;

    animation:particleAnim linear infinite;
}

@keyframes particleAnim{

    from{
        transform:translateY(100vh);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }

}

/* ===================================== */
/* VINHETA */
/* ===================================== */

.vignette{
    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle,
        transparent 40%,
        rgba(0,0,0,0.9) 100%
    );
}

/* ===================================== */
/* CONTEÚDO */
/* ===================================== */

.main{
    position:relative;
    z-index:10;

    width:100%;
    height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:20px;
}

/* ===================================== */
/* LOGO */
/* ===================================== */

.logo{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;

    animation:fadeIn 2s ease;
}

.logo h1{

    font-size:58px;

    font-weight:700;

    letter-spacing:8px;

    color:#ff3d3d;

    text-shadow:
    0 0 10px rgba(255,0,0,0.5),
    0 0 25px rgba(255,0,0,0.25),
    0 0 45px rgba(255,0,0,0.15);

}

.logo p{

    margin-top:10px;

    font-size:14px;

    letter-spacing:4px;

    opacity:0.65;

}

/* ===================================== */
/* LINHA */
/* ===================================== */

.line{
    width:180px;
    height:1px;

    margin:22px 0;

    background:
    linear-gradient(
        to right,
        transparent,
        rgba(255,0,0,0.8),
        transparent
    );

    box-shadow:0 0 10px rgba(255,0,0,0.4);
}

/* ===================================== */
/* ANIMAÇÃO */
/* ===================================== */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }

}

/* ===================================== */
/* MOBILE */
/* ===================================== */

@media(max-width:500px){

    .logo h1{
        font-size:42px;
        letter-spacing:5px;
    }

    .logo p{
        font-size:11px;
        letter-spacing:3px;
    }

    .line{
        width:140px;
    }

}

</style>
</head>

<body>

<!-- ===================================== -->
<!-- FUNDO -->
<!-- ===================================== -->

<div class="background">

    <div class="fog"></div>
    <div class="fog fog2"></div>

    <div class="red-glow glow1"></div>
    <div class="red-glow glow2"></div>

    <div class="grid"></div>

    <div class="particles">

        <span style="left:10%; animation-duration:8s;"></span>
        <span style="left:20%; animation-duration:12s;"></span>
        <span style="left:35%; animation-duration:9s;"></span>
        <span style="left:50%; animation-duration:15s;"></span>
        <span style="left:65%; animation-duration:7s;"></span>
        <span style="left:75%; animation-duration:13s;"></span>
        <span style="left:85%; animation-duration:11s;"></span>

    </div>

    <div class="vignette"></div>

</div>

<!-- ===================================== -->
<!-- LOGO -->
<!-- ===================================== -->

<div class="main">

    <div class="logo">

        <h1>HEXATOMBE</h1>

        <div class="line"></div>

        <p>ORDEM PARANORMAL RPG</p>

    </div>

</div>

</body>
</html>
